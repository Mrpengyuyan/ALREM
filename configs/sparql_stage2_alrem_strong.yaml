# ============================================================
# Stage 2 — ALREM Strong Bottleneck on QALD-9-plus (multilingual)
# Resumes from Stage 1 ALREM adapter checkpoint
# r_high=32, r_low=4 (stronger mid-layer bottleneck)
# ============================================================
model_name_or_path: "Qwen/Qwen2.5-7B-Instruct"
task: sparql
method: alrem
quantization: "4bit"
precision: bf16
output_dir: outputs
run_name: sparql_s2_alrem_strong

# ── Stage 1 checkpoint (adapter to resume from) ──
# Must be produced by a Stage 1 run using the SAME strong-bottleneck pattern
# (r_high=32, r_low=4), otherwise Stage 2 adapter-compat check will fail.
stage1_checkpoint: outputs/sparql_s1_alrem_strong

# ── Data ──
stage2_data_path: data/sparql/qald9plus_stage2_train.jsonl
stage2_dev_path: data/sparql/qald9plus_stage2_dev.jsonl
test_data_path: data/sparql/qald9plus_test.jsonl
test_languages: ["en", "de", "es", "ru"]
sparql_cache_dir: data/sparql/cache
eval_protocol_path: configs/sparql_eval_shared.yaml

# ── LoRA / ALREM ──
target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
r_high: 32
r_low: 4
r_uniform: 16
cut_ratio_early: 0.25
cut_ratio_mid: 0.75
early_end: null
mid_end: null
lora_dropout: 0.05
lora_alpha_mode: "2r"
lora_alpha_fixed: null
r_match_max: 128

# ── Training ──
learning_rate: 1e-4
num_train_epochs: 5
max_seq_len: 512
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
warmup_ratio: 0.03
weight_decay: 0.0
max_steps: -1
grad_ckpt: true
seed: 42

# ── Logging / Checkpointing ──
logging_steps: 10
evaluation_strategy: steps
eval_steps: 50
save_strategy: steps
save_steps: 50
save_total_limit: 2
early_stopping_patience: 5

# ── Misc ──
max_train_samples: null
max_eval_samples: null
resume_from_checkpoint: null
