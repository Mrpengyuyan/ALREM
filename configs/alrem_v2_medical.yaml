model_name_or_path: "meta-llama/Llama-2-7b-hf" # Replace with your actual model path
task: flores
method: alrem
output_dir: outputs
run_name: alrem_v2_medical_stage_a

dataset_name: "wmt/biomed" # Placeholder
train_split: train
eval_split: validation
src_lang_field: "en"
tgt_lang_field: "de"
flores_prompt: "Translate from English to German:\n{source}\nTranslation:"

# ALREM v2 Module-Aware Configuration
target_modules_attention: ["q_proj", "k_proj", "v_proj", "o_proj"]
target_modules_mlp: ["gate_proj", "up_proj", "down_proj"]

# Attention: Sandwich Strategy
attention_r_high: 32
attention_r_low: 4
attention_cut_ratio_early: 0.2
attention_cut_ratio_mid: 0.8

# MLP: Capacity Preserving (Uniform)
mlp_r_uniform: 16

# General LoRA Config
lora_dropout: 0.05
lora_alpha_mode: "2r"
r_match_max: 128

# Training Hyperparameters
learning_rate: 2e-4
batch_size: 4
grad_accum: 4
num_train_epochs: 3
max_seq_len: 1024
precision: bf16
grad_ckpt: true
seed: 42
save_steps: 100
eval_steps: 100
logging_steps: 10
