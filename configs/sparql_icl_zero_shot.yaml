# ============================================================
# ICL baseline: zero-shot
# Generates predictions.jsonl (no adapter training/loading)
# ============================================================
model_name_or_path: "Qwen/Qwen2.5-7B-Instruct"
task: sparql
icl_mode: zero

# Data
test_data_path: data/sparql/qald9plus_test.jsonl
test_languages: ["en", "de", "es", "ru"]
sparql_cache_dir: data/sparql/cache
eval_protocol_path: configs/sparql_eval_shared.yaml

# Output
output_dir: outputs
run_name: sparql_icl_zero

# Inference
quantization: "4bit"
precision: bf16
max_seq_len: 512
max_new_tokens: 256
do_sample: false
temperature: 1.0
top_p: 1.0
seed: 42
