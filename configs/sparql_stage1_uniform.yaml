# ============================================================
# Stage 1 — Uniform LoRA baseline on LC-QuAD 2.0 (English)
# ============================================================
model_name_or_path: "Qwen/Qwen2.5-7B-Instruct"
task: sparql
method: uniform
quantization: "4bit"
precision: bf16
output_dir: outputs
run_name: sparql_s1_uniform

# ── Data ──
stage1_data_path: data/sparql/lcquad2_stage1_train.jsonl
stage1_dev_path: data/sparql/lcquad2_stage1_dev.jsonl

# ── LoRA ──
target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
r_uniform: 16
r_high: 32
r_low: 8
lora_dropout: 0.05
lora_alpha_mode: "2r"
lora_alpha_fixed: null
r_match_max: 128

# ── Training ──
learning_rate: 2e-4
num_train_epochs: 3
max_seq_len: 512
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
warmup_ratio: 0.03
weight_decay: 0.0
max_steps: -1
grad_ckpt: true
seed: 42

# ── Logging / Checkpointing ──
logging_steps: 10
evaluation_strategy: steps
eval_steps: 100
save_strategy: steps
save_steps: 100
save_total_limit: 2

# ── Misc ──
max_train_samples: null
max_eval_samples: null
resume_from_checkpoint: null
